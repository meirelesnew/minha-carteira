name: Executar IA Muth v2 Automaticamente

on:
  schedule:
    # Roda às 06:00 e 18:00 UTC (03:00 e 15:00 horário de Brasília)
    - cron: '0 6,18 * * 1-5'  # só dias úteis (seg-sex)
  workflow_dispatch:           # botão manual no GitHub

jobs:
  rodar-ia:
    runs-on: ubuntu-latest
    timeout-minutes: 60        # cancela se demorar mais de 1 hora

    steps:
      - name: Copiar arquivos do repositório
        uses: actions/checkout@v4   # ← atualizado de v3 para v4

      - name: Configurar Python
        uses: actions/setup-python@v5  # ← atualizado de v4 para v5
        with:
          python-version: '3.12'
          cache: 'pip'               # cache para instalar mais rápido

      - name: Instalar dependências
        run: |
          pip install --upgrade pip
          pip install yfinance tensorflow numpy requests scikit-learn pandas

      - name: Executar Muth v2
        run: python executar_ia.py

      - name: Resultado
        if: always()
        run: echo "Muth v2 finalizado em $(date '+%d/%m/%Y %H:%M')"
